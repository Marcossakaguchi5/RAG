server {
    listen 80;
    server_name _;
    client_max_body_size 50m;
    client_body_timeout 900s;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://ingest-api:8000/api/;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }

    location /health {
        proxy_pass http://ingest-api:8000/health;
    }

    location = /docs {
        proxy_pass http://ingest-api:8000/docs;
    }

    location = /docs/oauth2-redirect {
        proxy_pass http://ingest-api:8000/docs/oauth2-redirect;
    }

    location = /openapi.json {
        proxy_pass http://ingest-api:8000/openapi.json;
    }

    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
