services:
  mysql:
    container_name:  RI-ingest-dep-mysql
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: rag_ingest
      MYSQL_USER: rag
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rag_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    container_name:  RI-ingest-dep-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  qdrant:
    container_name:  RI-ingest-dep-qdrant
    image: qdrant/qdrant:v1.13.3
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "${QDRANT_PORT:-6335}:6333"
      - "${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ingest-api:
    container_name:  RI-ingest-api
    build:
      context: ./api
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: rag_ingest
      MYSQL_USER: rag
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rag_secret}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: rag-documents
      MINIO_SECURE: "false"
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_MODEL_REVISION: ${EMBEDDING_MODEL_REVISION:-}
      HF_HOME: /models
      FASTEMBED_CACHE_PATH: /models/fastembed
      CORS_ORIGINS: http://localhost:${WEB_PORT:-8080}
      INGEST_APP_PASSWORD: ${INGEST_APP_PASSWORD:-alterar-esta-senha}
      CHUNKING_STRATEGY: ${CHUNKING_STRATEGY:-recursive_text}
      CHUNK_MIN_WORDS: ${CHUNK_MIN_WORDS:-180}
      CHUNK_SIZE_WORDS: ${CHUNK_SIZE_WORDS:-700}
      CHUNK_OVERLAP_WORDS: ${CHUNK_OVERLAP_WORDS:-100}
      CHUNK_SIZE_TOKENS: ${CHUNK_SIZE_TOKENS:-512}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-64}
      PARENT_CHILD_SIZE_WORDS: ${PARENT_CHILD_SIZE_WORDS:-320}
      PARENT_CHILD_OVERLAP_WORDS: ${PARENT_CHILD_OVERLAP_WORDS:-60}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - model_cache:/models

  ingest-web:
    container_name:  RI-ingest-web
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - ingest-api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  mysql_data:
  minio_data:
  qdrant_data:
  model_cache:
