services:
  mysql:
    container_name: RI-ingest-dep-mysql
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    container_name: RI-ingest-dep-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal

  qdrant:
    container_name: RI-ingest-dep-qdrant
    image: qdrant/qdrant:v1.13.3
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  ingest-api:
    container_name: RI-ingest-api
    build:
      context: ./api
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: "false"

      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}

      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SPARSE_MODEL: ${SPARSE_MODEL}
      SPARSE_LANGUAGE: ${SPARSE_LANGUAGE}
      HF_HOME: /models
      FASTEMBED_CACHE_PATH: /models/fastembed

      CORS_ORIGINS: https://ingest.136-248-79-252.sslip.io
      INGEST_APP_PASSWORD: ${INGEST_APP_PASSWORD}
      INGEST_AUTH_TOKEN_TTL_SECONDS: ${INGEST_AUTH_TOKEN_TTL_SECONDS:-28800}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - model_cache:/models
    networks:
      - internal

  ingest-web:
    container_name: RI-ingest-web
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - ingest-api
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rag-ingest.rule=Host(`ingest.136-248-79-252.sslip.io`)"
      - "traefik.http.routers.rag-ingest.entrypoints=websecure"
      - "traefik.http.routers.rag-ingest.tls.certresolver=le"
      - "traefik.http.services.rag-ingest.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

volumes:
  mysql_data:
  minio_data:
  qdrant_data:
  model_cache:

networks:
  web:
    external: true
  internal:
    driver: bridge
