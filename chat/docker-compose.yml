services:
  chat-api:
    container_name: RI-chat-api
    build:
      context: ./api
    restart: unless-stopped
    environment:
      CORS_ORIGINS: http://localhost:${CHAT_WEB_PORT:-8081}
      INGEST_API_URL: ${INGEST_API_URL:-http://host.docker.internal:8010}
      CHAT_APP_PASSWORD: ${CHAT_APP_PASSWORD:-alterar-esta-senha}
      INGEST_APP_PASSWORD: ${INGEST_APP_PASSWORD:-alterar-esta-senha}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek/deepseek-v4-flash}
      RAGAS_MODEL: ${RAGAS_MODEL:-}
      RAGAS_EMBEDDING_MODEL: ${RAGAS_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      RAGAS_EMBEDDING_DEVICE: ${RAGAS_EMBEDDING_DEVICE:-}
      RAGAS_MAX_CONTEXT_CHARACTERS: ${RAGAS_MAX_CONTEXT_CHARACTERS:-3000}
      RAGAS_MAX_SOURCES: ${RAGAS_MAX_SOURCES:-3}
      RAGAS_PARALLEL_WORKERS: ${RAGAS_PARALLEL_WORKERS:-4}
      HF_HOME: /models/huggingface
    volumes:
      - chat-model-cache:/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CHAT_API_PORT:-8011}:8000"

  chat-web:
    container_name: RI-chat-web
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - chat-api
    ports:
      - "${CHAT_WEB_PORT:-8081}:80"

volumes:
  chat-model-cache:
