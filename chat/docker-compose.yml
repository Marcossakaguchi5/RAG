services:
  chat-api:
    container_name: chat-api
    build:
      context: ./api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CORS_ORIGINS: http://localhost:${CHAT_WEB_PORT:-8081}
      INGEST_API_URL: ${INGEST_API_URL:-http://host.docker.internal:8010}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CHAT_API_PORT:-8011}:8000"

  chat-web:
    container_name: chat-web
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - chat-api
    ports:
      - "${CHAT_WEB_PORT:-8081}:80"
