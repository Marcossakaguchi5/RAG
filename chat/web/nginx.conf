server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://chat-api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location /health {
        proxy_pass http://chat-api:8000/health;
    }

    location = /docs {
        proxy_pass http://chat-api:8000/docs;
    }

    location = /docs/oauth2-redirect {
        proxy_pass http://chat-api:8000/docs/oauth2-redirect;
    }

    location = /openapi.json {
        proxy_pass http://chat-api:8000/openapi.json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
